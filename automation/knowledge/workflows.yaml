excel-intelligence:

  - name: Monthly Financial Closing System
    problem: Finance teams spend hours preparing monthly closing reports manually.
    objective: Produce accurate monthly financial closing reports using AI.
    audience: Finance Teams

  - name: Executive KPI Reporting System
    problem: Executives wait too long for weekly KPI reports.
    objective: Generate executive KPI summaries with actionable insights.
    audience: Executives

  - name: Sales Performance Analysis System
    problem: Sales reports identify numbers but not business opportunities.
    objective: Analyze sales performance and recommend actions.
    audience: Sales Managers

  - name: Budget Variance Analysis System
    problem: Budget deviations are difficult to understand quickly.
    objective: Explain budget variances and recommend corrective actions.
    audience: Finance Managers

  - name: Operational Dashboard Creation System
    problem: Operational dashboards often contain too much irrelevant information.
    objective: Design executive dashboards focused on decision making.
    audience: Operations Managers

technical-documentation:

  - name: OAuth Integration Documentation System
    problem: OAuth integrations are poorly documented.
    objective: Produce enterprise-grade OAuth documentation.
    audience: Integration Teams

  - name: REST API Documentation System
    problem: API documentation is inconsistent across projects.
    objective: Standardize REST API documentation.
    audience: Developers

  - name: Enterprise Procedure Documentation System
    problem: Operational procedures vary between authors.
    objective: Produce standardized enterprise procedures.
    audience: Operations Teams

  - name: Root Cause Analysis System
    problem: Incident reports rarely identify the true root cause.
    objective: Produce structured RCA documentation.
    audience: Support Teams

  - name: Knowledge Transfer System
    problem: Critical knowledge is lost during project transitions.
    objective: Capture and transfer technical knowledge efficiently.
    audience: Technical Teams

troubleshooting:

  - name: Production Incident Investigation System
    problem: Production incidents take too long to investigate.
    objective: Accelerate enterprise incident diagnosis.
    audience: Support Engineers

  - name: Enterprise Log Analysis System
    problem: Large log files are difficult to interpret.
    objective: Extract actionable information from enterprise logs.
    audience: Platform Engineers

  - name: Performance Bottleneck Investigation System
    problem: Performance degradation is difficult to isolate.
    objective: Identify performance bottlenecks systematically.
    audience: Infrastructure Teams

  - name: Critical Error Diagnosis System
    problem: Critical application failures lack structured investigation.
    objective: Produce systematic diagnostic analysis.
    audience: Application Support

  - name: Disaster Recovery Planning System
    problem: Recovery procedures are incomplete or outdated.
    objective: Produce enterprise recovery plans.
    audience: IT Operations

project-delivery:

  - name: Project Kickoff Planning System
    problem: Projects start without complete planning.
