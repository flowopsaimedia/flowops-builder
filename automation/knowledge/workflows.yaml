    audience: Project Managers

  - name: Weekly Project Status Reporting System
    problem: Weekly reporting consumes excessive project time.
    objective: Generate executive project reports automatically.
    audience: PMO

  - name: Project Risk Assessment System
    problem: Project risks are identified too late.
    objective: Evaluate project risks proactively.
    audience: Project Leaders

  - name: Stakeholder Communication System
    problem: Stakeholder communication lacks consistency.
    objective: Produce professional stakeholder communications.
    audience: Project Managers

  - name: Lessons Learned Documentation System
    problem: Valuable project experience is never documented.
