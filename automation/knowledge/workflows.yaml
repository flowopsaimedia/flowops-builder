  - name: Executive Decision Memo System
    problem: Executive decisions are poorly documented.
    objective: Produce concise executive decision memos.
    audience: Executives

  - name: Executive Presentation Builder System
    problem: Executive presentations require excessive preparation time.
    objective: Create presentation-ready business content.
    audience: Directors

  - name: Weekly Leadership Summary System
    problem: Leadership updates are repetitive and inconsistent.
    objective: Produce weekly executive summaries.
    audience: Leadership

  - name: Executive Email Assistant System
    problem: Executive emails consume valuable time.
    objective: Draft executive-quality communications.
    audience: Executives

  - name: Strategic Meeting Preparation System
    problem: Strategic meetings begin without adequate preparation.
    objective: Prepare structured executive meeting briefs.
